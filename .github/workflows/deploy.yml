name: Deploy Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -e
            cd /home/workatkatana/trndinn-stack/trndinn-frontend
            git pull origin main
            cd /home/workatkatana/trndinn-stack
            docker compose build trndinn-frontend
            docker compose up -d --no-deps trndinn-frontend
