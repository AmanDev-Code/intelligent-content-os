name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/workatkatana/trndinn-stack/trndinn-frontend
            git pull origin main
            cd /home/workatkatana/trndinn-stack
            docker compose build trndinn-frontend
            docker compose up -d trndinn-frontend
