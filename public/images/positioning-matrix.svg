<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1200" fill="#ffffff"/>
  
  <!-- Grid lines (light) -->
  <line x1="600" y1="120" x2="600" y2="1080" 
        stroke="#e2e8f0" stroke-width="1"/>
  <line x1="120" y1="600" x2="1080" y2="600" 
        stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Main axes -->
  <line x1="120" y1="120" x2="120" y2="1080" 
        stroke="#94a3b8" stroke-width="2"/>
  <line x1="120" y1="1080" x2="1080" y2="1080" 
        stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Y-axis label (rotated) -->
  <text x="30" y="600" transform="rotate(-90 30 600)" 
        font-family="sans-serif" font-size="18" font-weight="bold" 
        fill="#64748b" text-anchor="middle">
    SEO / Content Depth
  </text>
  
  <!-- Y-axis markers -->
  <text x="100" y="140" 
        font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="end">
    High
  </text>
  <text x="100" y="1070" 
        font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="end">
    Low
  </text>
  
  <!-- X-axis label -->
  <text x="600" y="1160" 
        font-family="sans-serif" font-size="18" font-weight="bold" 
        fill="#64748b" text-anchor="middle">
    Channel Breadth
  </text>
  
  <!-- X-axis markers -->
  <text x="160" y="1110" 
        font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="middle">
    Low
  </text>
  <text x="1040" y="1110" 
        font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="middle">
    High
  </text>
  
  <!-- Trndinn point with gradient -->
  <defs>
    <radialGradient id="trndinnGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff8a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d39;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <circle cx="408" cy="360" r="18" fill="url(#trndinnGradient)"/>
  
  <!-- Trndinn label -->
  <text x="408" y="325" 
        font-family="sans-serif" font-size="24" font-weight="bold" 
        fill="#1e293b" text-anchor="middle">
    Trndinn
  </text>
  <text x="408" y="348" 
        font-family="sans-serif" font-size="16" 
        fill="#64748b" text-anchor="middle">
    Agentic Growth OS
  </text>
  
  <!-- Postiz point -->
  <circle cx="840" cy="792" r="18" fill="#64748b"/>
  
  <!-- Postiz label -->
  <text x="840" y="757" 
        font-family="sans-serif" font-size="24" font-weight="bold" 
        fill="#1e293b" text-anchor="middle">
    Postiz
  </text>
  <text x="840" y="780" 
        font-family="sans-serif" font-size="16" 
        fill="#64748b" text-anchor="middle">
    Agentic Scheduler
  </text>
  
  <!-- Border -->
  <rect width="1200" height="1200" fill="none" stroke="#e2e8f0" stroke-width="2"/>
</svg>