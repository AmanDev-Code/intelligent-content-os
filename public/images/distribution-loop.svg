<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="900" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="sans-serif" font-size="24" font-weight="bold" 
